<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1a1a2e"/>
<stop offset="1" stop-color="#16213e"/>
</linearGradient>
</defs>
<rect width="495" height="195" rx="6" fill="url(#bg)" stroke="#F7B2C9" stroke-width="1" stroke-opacity="0.3"/>
<text x="25" y="35" fill="#F7B2C9" font-size="14" font-family="Segoe UI, sans-serif" font-weight="600">ThisWo 的 GitHub 统计</text>
<line x1="25" y1="45" x2="470" y2="45" stroke="#F7B2C9" stroke-width="0.5" stroke-opacity="0.2"/>
<!-- Stars -->
<text x="25" y="72" fill="#888" font-size="13" font-family="Segoe UI, sans-serif">&#11088; 获得 Star 总数</text>
<text x="470" y="72" fill="#F7B2C9" font-size="13" font-family="Segoe UI, sans-serif" text-anchor="end" font-weight="600">1</text>
<!-- Commits -->
<text x="25" y="100" fill="#888" font-size="13" font-family="Segoe UI, sans-serif">&#128640; 总提交数</text>
<text x="470" y="100" fill="#F7B2C9" font-size="13" font-family="Segoe UI, sans-serif" text-anchor="end" font-weight="600">45</text>
<!-- PRs -->
<text x="25" y="128" fill="#888" font-size="13" font-family="Segoe UI, sans-serif">&#128279; Pull Request 数量</text>
<text x="470" y="128" fill="#F7B2C9" font-size="13" font-family="Segoe UI, sans-serif" text-anchor="end" font-weight="600">0</text>
<!-- Issues -->
<text x="25" y="156" fill="#888" font-size="13" font-family="Segoe UI, sans-serif">&#128221; Issue 数量</text>
<text x="470" y="156" fill="#F7B2C9" font-size="13" font-family="Segoe UI, sans-serif" text-anchor="end" font-weight="600">2</text>
<!-- Contributed to -->
<text x="25" y="184" fill="#888" font-size="13" font-family="Segoe UI, sans-serif">&#127968; 参与项目数量</text>
<text x="470" y="184" fill="#F7B2C9" font-size="13" font-family="Segoe UI, sans-serif" text-anchor="end" font-weight="600">19</text>
</svg>